name: Deploy to Tencent COS

on:
  push:
    branches:
      - release
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      VITE_IMG_PROXY: ${{ vars.VITE_IMG_PROXY }}
      VITE_LIVEJSON_PROXY: ${{ vars.VITE_LIVEJSON_PROXY }}
      VITE_CHATROOM_APP_ID: ${{ secrets.VITE_CHATROOM_APP_ID }}
      VITE_CHATROOM_APP_KEY: ${{ secrets.VITE_CHATROOM_APP_KEY }}
      VITE_ENGAGEMENT_CHATROOM_ID: ${{ secrets.VITE_ENGAGEMENT_CHATROOM_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build:all

      - name: Deploy to Tencent COS
        uses: TencentCloud/cos-action@v1
        with:
          secret_id: ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
          secret_key: ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}
          cos_bucket: ${{ secrets.COS_BUCKET }}
          cos_region: ${{ secrets.COS_REGION }}
          local_path: dist
          remote_path: /
          clean: true

      - name: Prevent stale app shell and service worker cache
        run: |
          pipx install coscmd
          coscmd config \
            -a "${{ secrets.TENCENT_CLOUD_SECRET_ID }}" \
            -s "${{ secrets.TENCENT_CLOUD_SECRET_KEY }}" \
            -b "${{ secrets.COS_BUCKET }}" \
            -r "${{ secrets.COS_REGION }}"
          coscmd upload -f -y -H '{"Cache-Control":"no-cache, no-store, must-revalidate"}' dist/index.html /index.html
          coscmd upload -f -y -H '{"Cache-Control":"no-cache, no-store, must-revalidate"}' dist/sw.js /sw.js
          coscmd upload -f -y -H '{"Cache-Control":"no-cache, no-store, must-revalidate"}' dist/manifest.webmanifest /manifest.webmanifest
          coscmd upload -f -y -H '{"Cache-Control":"no-cache, no-store, must-revalidate"}' dist/iframe-inject.js /iframe-inject.js

      - name: Purge Tencent CDN app shell cache
        run: |
          pipx install tccli
          tccli configure set secretId "${{ secrets.TENCENT_CLOUD_SECRET_ID }}"
          tccli configure set secretKey "${{ secrets.TENCENT_CLOUD_SECRET_KEY }}"
          tccli configure set region "${{ secrets.COS_REGION }}"
          tccli cdn PurgeUrlsCache --Urls '[
            "https://rmlive.scutbot.cn/",
            "https://rmlive.scutbot.cn/index.html",
            "https://rmlive.scutbot.cn/sw.js",
            "https://rmlive.scutbot.cn/manifest.webmanifest",
            "https://rmlive.scutbot.cn/iframe-inject.js"
          ]'
